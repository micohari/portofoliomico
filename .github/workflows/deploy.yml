name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (TanStack Start + Nitro Cloudflare preset)
        run: bun run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      # Step tambahan untuk melihat lokasi asli file wrangler.json jika nanti masih error
      - name: Debug Output Directory
        run: |
          echo "=== Cek isi folder .output ==="
          ls -R .output || echo "Folder .output tidak ditemukan"
          echo "=== Cek isi folder dist ==="
          ls -R dist || echo "Folder dist tidak ditemukan"

      # Di sini kita ubah path config-nya dari dist/server ke .output/server
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config .output/server/wrangler.json --name portomico
